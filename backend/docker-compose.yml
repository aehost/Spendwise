version: '3.8'

# ── SpendWise Microservices — Local Dev Stack ──────────────────
# Usage:
#   docker compose up --build        # first run (builds all images)
#   docker compose up -d             # start in background
#   docker compose logs -f           # tail logs
#   docker compose down              # stop
#   docker compose down -v           # stop + delete database volume

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spendwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SpendWise@Dev2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spendwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service (port 3001) ──────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:SpendWise@Dev2025@postgres:5432/spendwise
      JWT_ACCESS_SECRET: spendwise_access_jwt_secret_min32chars_2025!
      JWT_REFRESH_SECRET: spendwise_refresh_jwt_secret_min32chars_2025!
      PORT: "3001"
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # ── Transaction Service (port 3002) ───────────────────────────
  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:SpendWise@Dev2025@postgres:5432/spendwise
      JWT_ACCESS_SECRET: spendwise_access_jwt_secret_min32chars_2025!
      PORT: "3002"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ── User Service (port 3003) ──────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:SpendWise@Dev2025@postgres:5432/spendwise
      JWT_ACCESS_SECRET: spendwise_access_jwt_secret_min32chars_2025!
      PORT: "3003"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ── Analytics Service (port 3004) ─────────────────────────────
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://postgres:SpendWise@Dev2025@postgres:5432/spendwise
      JWT_ACCESS_SECRET: spendwise_access_jwt_secret_min32chars_2025!
      PORT: "3004"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Gateway (port 3000) ───────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:SpendWise@Dev2025@postgres:5432/spendwise
      AUTH_SERVICE_URL: http://auth-service:3001
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      USER_SERVICE_URL: http://user-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
      JWT_ACCESS_SECRET: spendwise_access_jwt_secret_min32chars_2025!
      JWT_REFRESH_SECRET: spendwise_refresh_jwt_secret_min32chars_2025!
      PORT: "3000"
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    depends_on:
      - auth-service
      - transaction-service
      - user-service
      - analytics-service

volumes:
  pgdata:
    driver: local
