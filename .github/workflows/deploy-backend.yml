name: Build & Push Backend to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - transaction-service
          - user-service
          - analytics-service
          - api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (test build only)
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/spendwise-${{ matrix.service }}:latest \
            backend/${{ matrix.service }} \
            --progress=plain 2>&1 | tail -50
        shell: bash

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/spendwise-${{ matrix.service }}:latest
        shell: bash
