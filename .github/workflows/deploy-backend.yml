name: Build & Push Backend to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - transaction-service
          - user-service
          - analytics-service
          - api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/spendwise-${{ matrix.service }}"
          echo "=== Building $IMAGE ==="
          docker build \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${{ github.sha }}" \
            --file "backend/${{ matrix.service }}/Dockerfile" \
            --progress=plain \
            "backend/${{ matrix.service }}"
          echo "=== Build succeeded, pushing... ==="
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"
          echo "=== Done ==="
