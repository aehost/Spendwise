name: Build Android APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy index.html into Android assets
        run: cp index.html android/app/src/main/assets/index.html

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # Decode keystore and set output flag for conditional steps
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/spendwise.keystore
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "No KEYSTORE_BASE64 secret — building debug only."
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Always build debug APK (no keystore needed)
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # Signed release AAB for Play Store — only when keystore is available
      - name: Build Release AAB (Play Store)
        if: steps.keystore.outputs.available == 'true'
        working-directory: android
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: ./gradlew bundleRelease --no-daemon

      # Signed release APK for direct install
      - name: Build Release APK
        if: steps.keystore.outputs.available == 'true'
        working-directory: android
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SpendWise-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release AAB (Play Store)
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SpendWise-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload Release APK
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SpendWise-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
