<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpendWise">
<meta name="theme-color" content="#0A0A0F">
<title>SpendWise</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0F;--card:#13131A;--card2:#1A1A25;--border:#1E1E2E;
  --accent:#6C63FF;--green:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --cyan:#06B6D4;--pink:#EC4899;--orange:#F97316;--teal:#10B981;--indigo:#6366F1;
  --text:#F1F1F5;--muted:#6B7280;--muted2:#9CA3AF;
  --sb:env(safe-area-inset-bottom,0px);
  color-scheme:dark;
}
html{overflow-y:scroll;}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
input,select,textarea,button{font-family:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
*::-webkit-scrollbar{display:none;}*{-ms-overflow-style:none;scrollbar-width:none;}

#statusbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);}
#statusbar .logo{font-weight:900;font-size:17px;letter-spacing:-0.5px;background:linear-gradient(135deg,#6C63FF,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#statusbar .right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}

#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0D0D16F0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:4px 0 calc(var(--sb)+6px);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:9px;font-weight:600;padding:6px 2px;transition:color 0.2s;letter-spacing:0.3px;min-height:52px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.nav-btn.active{color:var(--accent);}.nav-btn .ico{font-size:22px;line-height:1;}

#app{padding-top:56px;padding-bottom:calc(var(--sb)+80px);min-height:100dvh;}
.page{display:none;padding:16px 20px 8px;animation:fadeSlide 0.25s ease;}
.page.active{display:block;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--card);border-radius:20px;padding:18px;margin-bottom:14px;border:1px solid var(--border);}
.card.caccent{background:linear-gradient(135deg,#6C63FF1A,#8B5CF61A);border-color:#6C63FF33;}
.card.cgreen{background:linear-gradient(135deg,#22C55E0D,#22C55E1A);border-color:#22C55E2A;}
.card.cred{background:linear-gradient(135deg,#EF44440D,#EF44441A);border-color:#EF444430;}
.card.camber{background:linear-gradient(135deg,#F59E0B0D,#F59E0B1A);border-color:#F59E0B30;}
.card.cteal{background:linear-gradient(135deg,#10B9810D,#10B9811A);border-color:#10B98130;}
.card.cindigo{background:linear-gradient(135deg,#6366F10D,#6366F11A);border-color:#6366F130;}

.label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.bignum{font-size:30px;font-weight:900;letter-spacing:-1.5px;}
.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;letter-spacing:-0.2px;}

.btn{padding:14px 20px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;text-align:center;transition:opacity 0.15s;display:block;}
.btn:active{opacity:0.75;}
.btn-primary{background:linear-gradient(135deg,#6C63FF,#8B5CF6);color:#fff;}
.btn-green{background:#22C55E1A;color:var(--green);border:1px solid #22C55E30;}
.btn-red{background:#EF44441A;color:var(--red);border:1px solid #EF444430;}
.btn-ghost{background:var(--card2);color:var(--muted2);border:1px solid var(--border);}
.btn-teal{background:#10B9811A;color:var(--teal);border:1px solid #10B98130;}
.btn-amber{background:#F59E0B1A;color:var(--amber);border:1px solid #F59E0B30;}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px;width:auto;display:inline-block;}

.form-group{margin-bottom:13px;}
.form-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:0.3px;}
.form-input{width:100%;background:#000000;border:1.5px solid #1E1E2E;border-radius:12px;padding:12px 14px;color:#FFFFFF;-webkit-text-fill-color:#FFFFFF;font-size:15px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#6C63FF;}
select.form-input{-webkit-appearance:none;appearance:none;background-color:#000000!important;color:#FFFFFF!important;-webkit-text-fill-color:#FFFFFF!important;}
/* Force explicit colours on all form controls — prevents Android WebView white-on-white */
input.form-input,textarea.form-input{background-color:#000000!important;color:#FFFFFF!important;-webkit-text-fill-color:#FFFFFF!important;}
.modal-body input,.modal-body select,.modal-body textarea{background:#000000!important;color:#FFFFFF!important;-webkit-text-fill-color:#FFFFFF!important;border-color:#1E1E2E!important;}
.form-row{display:flex;gap:10px;}.form-row .form-group{flex:1;}

.tx-item{background:var(--card);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:11px;margin-bottom:8px;border:1px solid var(--border);}
.tx-item.pending{border-color:#F59E0B55;background:linear-gradient(135deg,#F59E0B06,#F59E0B10);}
.tx-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-details{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:10px;color:var(--muted);margin-top:1px;}
.tx-amt{font-size:14px;font-weight:700;flex-shrink:0;text-align:right;}
.tag{font-size:8px;padding:2px 6px;border-radius:5px;display:inline-block;margin-top:2px;font-weight:700;}
.tag-waste{background:#EF444415;color:var(--red);}
.tag-pending{background:#F59E0B15;color:var(--amber);}
.tag-family{background:#10B98115;color:var(--teal);}
.tag-loan{background:#6C63FF15;color:var(--accent);}
.tag-card{background:#EC489915;color:var(--pink);}

.loan-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.prog-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;border-radius:99px;}
.prog-bar-thick{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin:8px 0;}

.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;}
.pill-green{background:#22C55E18;color:var(--green);}
.pill-red{background:#EF444418;color:var(--red);}
.pill-amber{background:#F59E0B18;color:var(--amber);}
.pill-blue{background:#3B82F618;color:#3B82F6;}
.pill-teal{background:#10B98118;color:var(--teal);}

#overlay{position:fixed;inset:0;background:#000000CC;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center;z-index:200;}
#overlay.show{display:flex;}
#modal-sheet{background:linear-gradient(160deg,#1C1C2E,#13131A);border-radius:26px 26px 0 0;width:100%;max-width:430px;padding:6px 0 calc(var(--sb)+28px);border:1px solid #6C63FF33;border-bottom:none;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.34,1.4,0.64,1);max-height:92vh;overflow-y:auto;}
#overlay.show #modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:3.5px;background:#2A2A3E;border-radius:99px;margin:10px auto 18px;}
.modal-body{padding:0 22px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-0.3px;}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.cat-btn{background:var(--card2);border:1.5px solid transparent;border-radius:11px;padding:9px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:12px;text-align:left;width:100%;}
.cat-btn.sel{font-weight:700;}

.toggle{width:42px;height:23px;border-radius:99px;background:#252535;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';width:19px;height:19px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left 0.2s;box-shadow:0 1px 4px #0006;}
.toggle.on::after{left:21px;}

.insight{background:var(--card);border-radius:13px;padding:13px 15px;margin-bottom:9px;border:1px solid var(--border);}
.chip-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;}
.chip{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:var(--card);}
.divider{height:1px;background:var(--border);margin:14px 0;}

#toast{position:fixed;bottom:calc(var(--sb)+88px);left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:99px;font-size:12px;font-weight:700;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px #22C55E44;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mini-card{background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--border);}
.mini-card .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.mini-card .val{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.mini-card .sub{font-size:10px;color:var(--muted);margin-top:3px;}

.pending-bar{background:linear-gradient(135deg,#F59E0B12,#F59E0B22);border:1px solid #F59E0B44;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulseAnim 1.5s infinite;flex-shrink:0;}
@keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

.bill-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.bill-row:last-child{border-bottom:none;}
.bill-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;font-size:12px;}
.bill-check.done{background:var(--green);border-color:var(--green);color:#fff;}

.cc-card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:12px;border:1px solid var(--border);}
.cc-limit-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin:10px 0;}

.invest-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.invest-row:last-child{border-bottom:none;}

.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;}

/* ── PWA HOME SCREEN SAFE AREA ─────────────────────────────────
   Uses env() DIRECTLY (not through CSS variable) + max() floor.
   max(env(safe-area-inset-top), 50px) guarantees:
     iPhone Dynamic Island (59px) → 59px
     iPhone notch (44–47px)       → 50px
     env() broken / returns 0     → 50px  (always clears status bar)
   Applied via BOTH @media AND html.sw-sa (JS fallback) so if one
   fails the other catches it. ─────────────────────────────────── */
@media (display-mode:standalone){
  #statusbar{padding-top:max(env(safe-area-inset-top),50px);padding-bottom:8px;}
  #app{padding-top:max(calc(env(safe-area-inset-top) + 54px),104px);}
  #nav{padding-bottom:max(env(safe-area-inset-bottom),20px);}
  #toast{bottom:max(calc(env(safe-area-inset-bottom) + 72px),92px);}
}
html.sw-sa #statusbar{padding-top:max(env(safe-area-inset-top),50px);padding-bottom:8px;}
html.sw-sa #app{padding-top:max(calc(env(safe-area-inset-top) + 54px),104px);}
html.sw-sa #nav{padding-bottom:max(env(safe-area-inset-bottom),20px);}
html.sw-sa #toast{bottom:max(calc(env(safe-area-inset-bottom) + 72px),92px);}

/* Android native app — status bar handled by MainActivity, no env() needed */
html.sw-android #statusbar{padding-top:12px;padding-bottom:8px;}
html.sw-android #app{padding-top:52px;}
html.sw-android #nav{padding-bottom:8px;}
html.sw-android #toast{bottom:80px;}

/* ── AUTH SCREEN ─────────────────────────────────────────────── */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
.auth-logo{font-size:48px;margin-bottom:6px;text-align:center;}
.auth-brand{font-size:28px;font-weight:900;background:linear-gradient(135deg,#6C63FF,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;text-align:center;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;}
.auth-card{background:var(--card);border-radius:22px;padding:24px 22px;width:100%;max-width:390px;border:1px solid var(--border);}
.auth-tab{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:20px;}
.auth-tab-btn{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:700;color:var(--muted);transition:all 0.2s;text-align:center;cursor:pointer;border:none;background:none;}
.auth-tab-btn.active{background:var(--accent);color:#fff;}
.pw-req{font-size:10px;color:var(--muted);transition:color 0.2s;}

</style>
</head>
<body>
<div id="statusbar">
  <span class="logo">SpendWise</span>
  <div class="right">
    <div id="sync-dot" title="Cloud sync" style="width:7px;height:7px;border-radius:50%;background:var(--green);display:none;flex-shrink:0;"></div>
    <span id="clock"></span>
  </div>
</div>
<!-- ── AUTH SCREEN (shown on first launch / new install) ── -->
<div id="auth-screen">
  <div class="auth-logo" id="auth-logo">₹</div>
  <div class="auth-brand">SpendWise</div>
  <div class="auth-sub">Personal finance, securely yours</div>
  <div class="auth-card">
    <div class="auth-tab">
      <button class="auth-tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab-btn" id="tab-signup" onclick="switchAuthTab('signup')">Create Account</button>
    </div>
    <div id="auth-err" style="display:none;background:#EF444412;border:1px solid #EF444430;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:14px;line-height:1.4;"></div>
    <div class="form-group"><label class="form-label">Email</label>
      <input class="form-input" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
    <div class="form-group"><label class="form-label">Password</label>
      <div style="position:relative;">
        <input class="form-input" id="auth-pass" type="password" placeholder="Min 8 characters" autocomplete="current-password" oninput="updatePasswordStrength()" style="padding-right:44px;">
        <button type="button" onclick="togglePassVis()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);background:none;border:none;cursor:pointer;" id="pass-vis-btn">👁</button>
      </div>
    </div>
    <div id="pw-strength-wrap" style="display:none;margin:-4px 0 13px;">
      <div style="height:4px;background:var(--border);border-radius:99px;margin-bottom:8px;overflow:hidden;">
        <div id="pw-strength-bar" style="height:100%;width:0%;border-radius:99px;transition:all 0.3s;"></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
        <span class="pw-req" id="req-len">○ 8+ chars</span>
        <span class="pw-req" id="req-upper">○ Uppercase</span>
        <span class="pw-req" id="req-num">○ Number</span>
        <span class="pw-req" id="req-special">○ Special (!@#$)</span>
      </div>
      <div style="text-align:right;"><span id="pw-strength-hint" style="font-size:10px;font-weight:700;color:var(--muted);"></span></div>
    </div>
    <button onclick="submitAuth()" class="btn btn-primary" id="auth-submit-btn">Login</button>
  </div>
</div>

<div id="app">
  <div class="page active" id="page-home"></div>
  <div class="page" id="page-tx"></div>
  <div class="page" id="page-cards"></div>
  <div class="page" id="page-loans"></div>
  <div class="page" id="page-money"></div>
  <div class="page" id="page-settings"></div>
</div>
<nav id="nav">
  <button class="nav-btn active" onclick="goTo('home')"><span class="ico">🏠</span>Home</button>
  <button class="nav-btn" onclick="goTo('tx')"><span class="ico">💳</span>Spends</button>
  <button class="nav-btn" onclick="goTo('cards')"><span class="ico">💴</span>Cards</button>
  <button class="nav-btn" onclick="goTo('loans')"><span class="ico">🏦</span>Loans</button>
  <button class="nav-btn" onclick="goTo('money')"><span class="ico">💹</span>Money</button>
  <button class="nav-btn" onclick="goTo('settings')"><span class="ico">⚙️</span>Settings</button>
</nav>
<div id="overlay" onclick="maybeClose(event)">
  <div id="modal-sheet"><div class="modal-handle"></div><div class="modal-body" id="modal-body"></div></div>
</div>
<div id="toast"></div>
<script>
// PWA standalone detection — adds class so CSS safe-area rules activate.
if(window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches){
  document.documentElement.classList.add('sw-sa');
}
// Android native app detection
const IS_ANDROID=typeof AndroidBridge!=='undefined'&&AndroidBridge.getPlatform()==='android';
if(IS_ANDROID){document.documentElement.classList.add('sw-android');}

// ── CURRENCY DETECTION ────────────────────────────────────────
const _locale=navigator.language||'en-IN';
const _LOCALE_CURRENCY={'en-IN':'INR','hi-IN':'INR','hi':'INR','en-PK':'PKR','ur-PK':'PKR','ur':'PKR','en-BD':'BDT','bn-BD':'BDT','en-LK':'LKR','si-LK':'LKR','en-NP':'NPR','ne-NP':'NPR','en-US':'USD','en-CA':'CAD','en-AU':'AUD','en-NZ':'NZD','en-GB':'GBP','en-ZA':'ZAR','en-NG':'NGN','en-SG':'SGD','en-MY':'MYR','ms-MY':'MYR','en-AE':'AED','ar-AE':'AED','ar-SA':'SAR','en-SA':'SAR','de-DE':'EUR','de-AT':'EUR','de-CH':'CHF','fr-FR':'EUR','fr-BE':'EUR','fr-CH':'CHF','es-ES':'EUR','it-IT':'EUR','pt-PT':'EUR','pt-BR':'BRL','es-MX':'MXN','es-AR':'ARS','es-CO':'COP','ja-JP':'JPY','ja':'JPY','zh-CN':'CNY','zh-TW':'TWD','ko-KR':'KRW','ko':'KRW','ru-RU':'RUB','ru':'RUB','tr-TR':'TRY','tr':'TRY','id-ID':'IDR','id':'IDR','th-TH':'THB','th':'THB','vi-VN':'VND','vi':'VND','pl-PL':'PLN','cs-CZ':'CZK','hu-HU':'HUF','ro-RO':'RON','uk-UA':'UAH','el-GR':'EUR','nl-NL':'EUR','nl-BE':'EUR','sv-SE':'SEK','nb-NO':'NOK','da-DK':'DKK','fi-FI':'EUR'};
function _detectCurrency(loc){if(_LOCALE_CURRENCY[loc])return _LOCALE_CURRENCY[loc];const country=(loc.split('-')[1]||'').toUpperCase();if(country){const f=Object.entries(_LOCALE_CURRENCY).find(([k])=>k.split('-')[1]===country);if(f)return f[1];}return'USD';}
const CURRENCY=_detectCurrency(_locale);
const IS_INR=CURRENCY==='INR';
let CUR_SYM=IS_INR?'₹':'$';
try{const parts=new Intl.NumberFormat(_locale,{style:'currency',currency:CURRENCY,minimumFractionDigits:0}).formatToParts(1);const sym=parts.find(p=>p.type==='currency');if(sym)CUR_SYM=sym.value;}catch(e){}
const _numFmt=(()=>{try{return new Intl.NumberFormat(_locale,{style:'currency',currency:CURRENCY,minimumFractionDigits:0,maximumFractionDigits:0});}catch(e){return null;}})();

// Called by MainActivity after SMS permission is granted
function onAndroidSMSReady(){
  const btn=document.getElementById('sms-btn-indicator');
  if(btn){btn.style.color='var(--green)';btn.title='SMS access ready';}
}

// ── REAL-TIME SMS HANDLER ────────────────────────────────────
// Called by MainActivity when a bank SMS notification is tapped.
// sms = {body, sender, time} parsed from AndroidBridge.getPendingSMS()
function onIncomingSMS(sms){
  if(!_fbUser){
    // Auth not ready yet — stash and retry once afterAuth() completes
    window._pendingIncomingSMS=sms;
    return;
  }
  const p=parseSMS(sms.body);

  // Save a pending tx immediately so it shows in Spends even if user skips
  const pendingId=Date.now();
  S.transactions.push({id:pendingId,amount:p.amount,merchant:p.merchant||'Bank Transaction',
    category:'other',date:today(),note:'',isWaste:false,isPending:true,
    loanId:null,creditCardId:null,contactName:'',isCredit:p.isCredit,smsRaw:sms.body.substring(0,200)});
  // Immediately update bank balance so all panels reflect the debit/credit
  if(p.bankBal){
    S.bankBalance={amount:p.bankBal,lastUpdated:today()};
  } else if(p.amount>0){

// ── FIRESTORE TYPE CONVERTERS ─────────────────────────────────
// JS value → Firestore typed field
function _fsV(v){if(v===null||v===undefined)return{nullValue:null};if(typeof v==='boolean')return{booleanValue:v};if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};if(typeof v==='string')return{stringValue:v};if(Array.isArray(v))return{arrayValue:{values:v.map(_fsV)}};if(typeof v==='object')return{mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,vv])=>[k,_fsV(vv)]))}};return{stringValue:String(v)};}
// Firestore typed field → JS value
function _fromFsV(f){if(!f)return null;if('nullValue' in f)return null;if('booleanValue' in f)return f.booleanValue;if('integerValue' in f)return parseInt(f.integerValue);if('doubleValue' in f)return f.doubleValue;if('stringValue' in f)return f.stringValue;if('arrayValue' in f)return(f.arrayValue.values||[]).map(_fromFsV);if('mapValue' in f)return Object.fromEntries(Object.entries(f.mapValue.fields||{}).map(([k,v])=>[k,_fromFsV(v)]));return null;}
function _fsDoc(obj){return{fields:Object.fromEntries(Object.entries(obj).map(([k,v])=>[k,_fsV(v)]))};}
function _fromFsDoc(doc){return Object.fromEntries(Object.entries(doc.fields||{}).map(([k,v])=>[k,_fromFsV(v)]));}

async function syncFromCloud(){
  if(!_fbUser)return false;
  if(!await ensureFreshToken())return false;
  updateSyncDot('pending');
  try{
    // Primary: Firestore
    const fsRes=await fetch(`${FS_URL}/users/${_fbUser.uid}`,
      {headers:{'Authorization':`Bearer ${_fbUser.idToken}`}});
    if(fsRes.ok){
      const doc=await fsRes.json();
      if(doc.fields){_applyCloudData(_fromFsDoc(doc));updateSyncDot('ok');return true;}
    }
    // One-time migration: Firestore has no data → try legacy Realtime DB
    if(fsRes.status===404){
      try{
        const rtRes=await fetch(`${FB_RT_URL}/users/${_fbUser.uid}/spendwise.json?auth=${_fbUser.idToken}`);

        }

  }catch(e){updateSyncDot('fail');return false;}
}

async function refreshAuthToken(){
  if(!_fbUser?.refreshToken)return false;
  const k=getFbApiKey();if(!k)return false;
  try{
    const res=await fetch(`https://securetoken.googleapis.com/v1/token?key=${k}`,
      {method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
       body:`grant_type=refresh_token&refresh_token=${_fbUser.refreshToken}`});
    const d=await res.json();if(!res.ok)return false;
    _fbUser.idToken=d.id_token;_fbUser.refreshToken=d.refresh_token;
    _fbUser.expiresAt=Date.now()+3500000;storeUser(_fbUser);return true;
  }catch(e){return false;}
}

  const e=[];
  if(p.length<8)e.push('8+ characters');
  if(!/[A-Z]/.test(p))e.push('uppercase letter');
  if(!/[0-9]/.test(p))e.push('number');
  if(!/[^A-Za-z0-9]/.test(p))e.push('special character (!@#$%...)');
  return e;
}

  const checks=[p.length>=8,/[A-Z]/.test(p),/[0-9]/.test(p),/[^A-Za-z0-9]/.test(p)];
  const score=checks.filter(Boolean).length;
  const colors=['#EF4444','#EF4444','#F59E0B','#F59E0B','#22C55E'];
  const labels=['','Weak','Fair','Good','Strong ✓'];
  bar.style.width=(score/4*100)+'%';
  bar.style.background=colors[score];
  hint.textContent=labels[score];hint.style.color=colors[score];
  const ids=['req-len','req-upper','req-num','req-special'];
  const reqs=['8+ chars','Uppercase','Number','Special char'];

async function deleteAccount(){
  if(!confirm('⚠️ Permanently delete your account?\n\nThis will erase ALL your data from Firebase and cannot be undone.'))return;
  const pw=prompt('Enter your password to confirm deletion:');
  if(!pw)return;
  toast('Verifying...');
  try{
    // Re-authenticate to get a fresh token (Firebase requires this for account deletion)
    const reAuth=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_API_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({email:_fbUser.email,password:pw,returnSecureToken:true})});
    const rd=await reAuth.json();
    if(!reAuth.ok){toast('Wrong password — account NOT deleted.',true);return;}
    const freshToken=rd.idToken;
    // Delete all Firestore data for this user
    await fetch(`${FS_URL}/users/${_fbUser.uid}`,
      {method:'DELETE',headers:{'Authorization':`Bearer ${freshToken}`}});
    // Delete Firebase Auth account
    await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:delete?key=${FB_API_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idToken:freshToken})});
    // Wipe local state
    _fbUser=null;
    localStorage.clear();
    S=JSON.parse(JSON.stringify(DEFAULT));
    document.getElementById('sync-dot').style.display='none';
    _authMode='login';
    switchAuthTab('login');
    showAuthScreen();
    toast('Account permanently deleted.');
  }catch(e){toast('Error deleting account. Check your connection.',true);}
}

// ── HELPERS ──────────────────────────────────────────────────
function fmt(n){
  const abs=Math.abs(n);
  if(IS_INR){if(abs>=10000000)return CUR_SYM+(n/10000000).toFixed(1)+'Cr';if(abs>=100000)return CUR_SYM+(n/100000).toFixed(1)+'L';if(abs>=1000)return CUR_SYM+(n/1000).toFixed(0)+'k';}
  else{if(abs>=1000000000)return CUR_SYM+(n/1000000000).toFixed(1)+'B';if(abs>=1000000)return CUR_SYM+(n/1000000).toFixed(1)+'M';if(abs>=1000)return CUR_SYM+(n/1000).toFixed(0)+'k';}
  return _numFmt?_numFmt.format(Math.round(n)):CUR_SYM+Math.round(abs).toLocaleString(_locale);
}
function fmtFull(n){return _numFmt?_numFmt.format(Math.abs(Math.round(n))):CUR_SYM+Math.abs(Math.round(n)).toLocaleString(_locale);}
function cat(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1];}
function today(){return new Date().toISOString().split('T')[0];}
function thisMonth(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function monthTxs(){const ym=thisMonth();return S.transactions.filter(t=>t.date.startsWith(ym));}
function totalSpent(){return monthTxs().filter(t=>t.category!=='income'&&t.category!=='savings'&&!t.isCredit).reduce((s,t)=>s+t.amount,0);}
function totalIncome(){return monthTxs().filter(t=>t.category==='income').reduce((s,t)=>s+t.amount,0);}
function totalWaste(){return monthTxs().filter(t=>t.isWaste||t.category==='waste').reduce((s,t)=>s+t.amount,0);}
function emiTotal(){return S.loans.reduce((s,l)=>s+l.emi,0);}
function salaryThisMonth(){return S.salary.history.find(h=>h.date&&h.date.startsWith(thisMonth()));}
function daysUntilSalary(){const n=new Date(),t=new Date(n.getFullYear(),n.getMonth(),S.salary.expectedDay);if(t<=n)t.setMonth(t.getMonth()+1);return Math.ceil((t-n)/86400000);}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString(_locale,{day:'numeric',month:'short'});}
function pendingTxs(){return S.transactions.filter(t=>t.isPending);}
function totalCCOutstanding(){return S.creditCards.reduce((s,c)=>s+c.outstanding,0);}
function totalCCLimit(){return S.creditCards.reduce((s,c)=>s+c.limit,0);}

function guessCat(m){
  m=m.toLowerCase();
  if(/swiggy|zomato|food|restaurant|cafe|pizza|burger|biryani/.test(m))return'food';
  if(/petrol|diesel|fuel|pump|hp |ioc|bharat/.test(m))return'fuel';
  if(/amazon|flipkart|myntra|ajio|nykaa|mall|shop/.test(m))return'shopping';
  if(/netflix|hotstar|spotify|prime|youtube|cinema|movie/.test(m))return'entertainment';
  if(/apollo|pharmacy|hospital|clinic|medical|health|doctor/.test(m))return'health';
  if(/electricity|airtel|jio|bsnl|water|gas|bill|bescom|tneb/.test(m))return'bills';
  if(/emi|loan|rbl|icici|kotak|cred|hdfc|sbi|axis/.test(m))return'emi';
  if(/irctc|ola|uber|rapido|train|flight|travel|mmt/.test(m))return'travel';
  if(/salary|sal|employer|payroll|tech corp/.test(m))return'income';
  if(/mom|dad|bro|sis|wife|husband|friend|family|transfer|neft|imps/.test(m))return'family';
  if(/angel|sip|mutual|invest|zerodha|groww/.test(m))return'investment';
  return'other';
}
function parseSMS(msg){
  const a=msg.match(/(?:Rs\.?|INR|₹|\$|USD|£|GBP|€|EUR|AUD|CAD|SGD|AED|SAR|PKR|LKR|NPR|BDT|NGN|MYR|JPY|CNY|KRW|RUB|TRY|IDR|THB|VND)\s*([\d,]+(?:\.\d+)?)/i);
  const amount=a?parseFloat(a[1].replace(/,/g,'')):0;
  const atM=msg.match(/at\s+([A-Z][A-Z0-9\s&']+?)(?:\s+on|\s*\.|Avail|Bal|$)/);
  const upiM=msg.match(/UPI\/[A-Z0-9]+\/\d+\/([^\n\/]+)/i);
  const empM=msg.match(/Employer:\s*([^\.]+)/i);
  const merchant=(atM&&atM[1].trim())||(upiM&&upiM[1].trim())||(empM&&empM[1].trim())||'Unknown';
  const isCredit=/credited|credit|salary|received|refund|cashback|deposit/i.test(msg);
  const isDebit=/debited|debit|deducted|payment|spent|purchase|withdrawn/i.test(msg);
  const balM=msg.match(/(?:Avail(?:able)?\s*Bal(?:ance)?|Avl\s*Bal|Bal(?:ance)?)[\s:]*(?:Rs\.?|INR|₹|\$|£|€)?\s*([\d,]+)/i);
  const bankBal=balM?parseFloat(balM[1].replace(/,/g,'')):null;
  return{amount,merchant:merchant.trim(),isCredit,isDebit,bankBal};
}

// Auto-scan SMS inbox for unrecorded bank transactions (last 3 days).
// More reliable than SMSReceiver BroadcastReceiver which battery optimizers kill on many devices.
function autoImportNewSMS(){
  if(!IS_ANDROID||!_fbUser)return;
  try{
    if(!AndroidBridge.hasSMSPermission())return;
    const list=JSON.parse(AndroidBridge.getBankSMS(3)||'[]');
    if(!list||!list.length)return;
    // Dedup using full body — prevents false-match of similar short messages
    const seen=new Set(S.transactions.filter(t=>t.smsRaw).map(t=>t.smsRaw));
    let added=0;
    list.forEach(s=>{
      const body=(s.body||'').trim();
      if(!body)return;
      const key=body.substring(0,200); // match on stored length
      if(seen.has(key))return;
      const p=parseSMS(body);
      if(!p.amount||p.amount<=0)return;
      const txDate=s.date?new Date(s.date).toISOString().split('T')[0]:today();
      // Detect salary credit
      const isSalary=/\b(salary|sal credit|payroll|employer)\b/i.test(body);
      const txCat=isSalary?'income':'other';
      S.transactions.push({
        id:Date.now()+added,amount:p.amount,
        merchant:p.merchant||'Bank Transaction',
        category:txCat,date:txDate,note:'',isWaste:false,
        isPending:!isSalary, // salary auto-confirmed; others need tagging
        loanId:null,creditCardId:null,contactName:'',
        isCredit:p.isCredit||isSalary,smsRaw:key});
      // Update bank balance from Avl Bal only when this SMS is NEWER than stored balance
      // (prevents old inbox SMS from overwriting a Firebase-synced or manually-set balance)
      if(p.bankBal){
        const smsTs=s.date||0;
        const balTs=S.bankBalance.lastUpdated?new Date(S.bankBalance.lastUpdated).getTime():0;
        if(smsTs>balTs){S.bankBalance={amount:p.bankBal,lastUpdated:txDate};}
      }
      // Auto-record salary history if not already this month
      if(isSalary&&!salaryThisMonth()){
        S.salary.history.push({amount:p.amount,date:txDate,note:'Auto-imported from SMS'});
        if(!S.salary.amount)S.salary.amount=p.amount;
      }
      seen.add(key);
      added++;
    });
    if(added>0){save();renderPage(currentPage);toast(`📩 ${added} bank transaction${added>1?'s':''} auto-imported from SMS`);}
  }catch(e){}
}

    </div>`:''}

    ${waste>0?`<div class="card cred" style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px;">🗑️ Waste Alert</div>

    </div>`:''}

    ${recent.map(tx=>txHTML(tx,true)).join('')}
    <button onclick="goTo('tx')" class="btn btn-ghost" style="margin-top:4px;font-size:13px;">View All →</button>
  `;
}

function fmtDateTime(tx){
  // Use tx.id (Date.now() ms) for precise time; fall back to date string
  const ts=typeof tx.id==='number'&&tx.id>1000000000000?tx.id:null;
  if(!ts){const d=tx.date?new Date(tx.date+'T00:00:00'):null;return d?d.toLocaleDateString(_locale,{day:'numeric',month:'short'}):'—';}
  const d=new Date(ts);
  return d.toLocaleDateString(_locale,{day:'numeric',month:'short'})+' '+d.toLocaleTimeString(_locale,{hour:'2-digit',minute:'2-digit',hour12:true});
}

function txHTML(tx,showDel){
  const c=cat(tx.category);
  // isInc: income category OR a credited family/other transfer
  const isInc=tx.category==='income'||(tx.isCredit===true&&tx.category!=='family'?false:tx.isCredit===true&&tx.category==='family');
  const isCreditTx=tx.category==='income'||tx.isCredit===true;
  const isFamily=tx.category==='family';
  const loanName=tx.loanId?S.loans.find(l=>l.id===tx.loanId):null;
  const ccName=tx.creditCardId?S.creditCards.find(cc=>cc.id===tx.creditCardId):null;
  const amtColor=isCreditTx?'var(--green)':'var(--red)';
  const amtSign=isCreditTx?'+':'-';
  return`<div class="tx-item ${tx.isPending?'pending':''}">
    <div class="tx-icon" style="background:${c.color}20;">${c.icon}</div>
    <div class="tx-details">
      <div class="tx-name">${tx.merchant}${isFamily&&tx.contactName?' · '+tx.contactName:''}</div>
      <div class="tx-meta">${c.label} · ${fmtDateTime(tx)}${tx.note?' · '+tx.note:''}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        ${tx.isWaste?'<span class="tag tag-waste">WASTEFUL</span>':''}
        ${tx.isPending?'<span class="tag tag-pending">⏳ NEEDS TAG</span>':''}
        ${loanName?`<span class="tag tag-loan">🏦 ${loanName.name}</span>`:''}
        ${ccName?`<span class="tag tag-card">💴 ${ccName.name}</span>`:''}
        ${isFamily?`<span class="tag tag-family">👨‍👩‍👧 ${tx.isCredit?'RECEIVED':'SENT'}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
      <div class="tx-amt" style="color:${amtColor};">${amtSign}${fmtFull(tx.amount)}</div>
      <div style="display:flex;gap:4px;">
        ${tx.smsRaw
          ?`<button onclick="openTagModal(${tx.id})" style="font-size:10px;color:var(--amber);background:#F59E0B18;border:1px solid #F59E0B30;padding:2px 7px;border-radius:6px;">🏷️ Tag</button>`

        ${showDel?`<button onclick="delTx(${tx.id})" style="font-size:10px;color:var(--muted);background:var(--card2);padding:2px 7px;border-radius:6px;">✕</button>`:''}
      </div>
    </div>
  </div>`;
}

function saveBills(){S.mandatoryBills.forEach(b=>{const n=document.getElementById('bill-name-'+b.id);const a=document.getElementById('bill-amt-'+b.id);const d=document.getElementById('bill-day-'+b.id);if(n)b.name=n.value;if(a)b.amount=parseFloat(a.value)||0;if(d)b.dueDay=parseInt(d.value)||1;});save();toast('Bills saved ✓');renderPage(currentPage);}
function toggleBill(id){const b=S.mandatoryBills.find(x=>x.id===id);if(!b)return;b.paidThisMonth=!b.paidThisMonth;if(b.paidThisMonth&&b.amount>0){S.transactions.push({id:Date.now(),amount:b.amount,merchant:b.name,category:'bills',date:today(),note:'Auto from bill',isWaste:false,isPending:false,loanId:null,creditCardId:null,contactName:''});toast('✅ Bill marked paid & transaction added!');}else{toast(b.name+' marked unpaid');}save();renderPage(currentPage);}
function exportCSV(){
  const rows=['Date,Merchant,Category,Amount,Note,Type,Wasteful,Pending'];
  S.transactions.forEach(t=>{const ln=t.loanId?S.loans.find(l=>l.id===t.loanId):null;const cc=t.creditCardId?S.creditCards.find(c=>c.id===t.creditCardId):null;rows.push(`${t.date},"${t.merchant}","${t.category}",${t.amount},"${t.note||''}","${t.isCredit?'Credit':'Debit'}",${t.isWaste?'Yes':'No'},${t.isPending?'Yes':'No'}`);});

async function clearData(){
  if(!confirm('Delete ALL data? This will also wipe your cloud data.'))return;
  localStorage.removeItem('sw_v4');
  S=JSON.parse(JSON.stringify(DEFAULT));
  renderPage(currentPage);
  if(_fbUser){
    toast('Clearing and syncing to cloud…');
    await syncToCloud();
    toast('✅ Data cleared and synced to cloud.');
  } else {
    toast('Data cleared');
  }
}
async function forceSyncFromCloud(){
  if(!_fbUser){toast('Sign in first',true);return;}
  if(!confirm('Clear local cache and reload from Firebase?\n\nLocal changes not yet synced will be lost.'))return;
  localStorage.removeItem('sw_v4');
  S=JSON.parse(JSON.stringify(DEFAULT));
  toast('Fetching from cloud…');
  const ok=await syncFromCloud();
  if(ok){renderPage(currentPage);toast('✅ Synced from cloud!');}
  else{toast('❌ Cloud sync failed — check connection',true);}
}

function exportBackup(){
  const json=JSON.stringify(S,null,2);
  if(IS_ANDROID&&typeof AndroidBridge!=='undefined'){
    AndroidBridge.shareText('SpendWise Backup '+today()+'.json',json);
    toast('✅ Backup shared via share sheet');return;
  }
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='SpendWise_backup_'+today()+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('✅ Backup downloaded!');
}

function importBackup(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.transactions||!d.loans){toast('❌ Invalid backup file',true);return;}
        if(!confirm('Replace ALL current data with this backup?\n\nThis cannot be undone.'))return;
        S={...DEFAULT,...d,
          bankBalance:d.bankBalance||DEFAULT.bankBalance,
          investments:d.investments||DEFAULT.investments,
          mandatoryBills:d.mandatoryBills||DEFAULT.mandatoryBills,
          creditCards:d.creditCards||DEFAULT.creditCards
        };
        save();renderPage(currentPage);toast('✅ Data restored from backup!');
      }catch(err){toast('❌ Could not read backup file',true);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function openMonthlyReport(){
  // Build list of months that have transactions + last 12 months
  const seen=new Set();
  S.transactions.forEach(t=>seen.add(t.date.substring(0,7)));
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);seen.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  const months=[...seen].sort().reverse().slice(0,18);
  const cur=thisMonth();
  openModal(`<div class="modal-title">📊 Monthly Analysis</div>

function renderMonthReport(){
  const ym=document.getElementById('rpt-month')?.value||thisMonth();
  const txs=S.transactions.filter(t=>t.date.startsWith(ym));
  const inc=txs.filter(t=>t.category==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.category!=='income'&&t.category!=='savings').reduce((s,t)=>s+t.amount,0);
  const waste=txs.filter(t=>t.isWaste).reduce((s,t)=>s+t.amount,0);
  const emiAmt=txs.filter(t=>t.category==='emi').reduce((s,t)=>s+t.amount,0);
  const savings=inc-exp;
  const catSpend={};
  txs.filter(t=>t.category!=='income'&&t.category!=='savings').forEach(t=>{catSpend[t.category]=(catSpend[t.category]||0)+t.amount;});
  const catRows=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]);
  const el=document.getElementById('mrpt-body');if(!el)return;
  el.innerHTML=`

      <div class="mini-card"><div class="lbl">Wasteful</div><div class="val" style="color:var(--amber);font-size:17px;">${fmtFull(waste)}</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;">Spending by Category</div>
    ${catRows.length===0?'<div style="color:var(--muted);text-align:center;padding:14px;font-size:13px;">No transactions this month</div>':''}
    ${catRows.map(([id,amt])=>{const c=cat(id);const pct=exp>0?Math.round((amt/exp)*100):0;return`
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;">

        </div>

  });
  const subject=`SpendWise Report — ${mn}`;
  if(IS_ANDROID&&typeof AndroidBridge!=='undefined'){
    AndroidBridge.shareText(subject,body);
  }else if(navigator.share){
    navigator.share({title:subject,text:body}).catch(()=>{});
  }else{
    window.location.href=`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
}

  const amt=parseFloat(document.getElementById('tx-amt').value);const mer=document.getElementById('tx-mer').value.trim();
  if(!amt||!mer){toast('Fill amount and description');return;}
  const cat=document.getElementById('tx-cat').value;const note=document.getElementById('tx-nt').value;
  const loanId=parseInt(document.getElementById('tx-loan').value)||null;

  const isPending=cat==='other'; // pending only when no category selected
  if(creditCardId){const cc=S.creditCards.find(c=>c.id===creditCardId);if(cc&&cat!=='income')cc.outstanding+=amt;}
  S.transactions.push({id:Date.now(),amount:amt,merchant:mer,category:cat,date:document.getElementById('tx-dt').value,note,isWaste:document.getElementById('tx-waste').classList.contains('on'),isPending,loanId,creditCardId,contactName:'',isCredit:cat==='income'});
  save();closeModal();toast('✅ Transaction added!');renderPage(currentPage);
}

function openSMSSim(){
  const msg=DEMO_SMS[smsIdx%DEMO_SMS.length];smsIdx++;
  const p=parseSMS(msg);_smsData=p;
  const guessed=guessCat(p.merchant);
  if(p.bankBal){S.bankBalance={amount:p.bankBal,lastUpdated:today()};save();}
  openModal(`<div class="modal-title">${p.isCredit?'💰 Money Received':'💸 Transaction Detected'}</div>
    <div style="background:var(--card2);border-radius:11px;padding:11px 13px;font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5;">"${msg}"</div>
    ${p.bankBal?`<div style="background:#22C55E12;border:1px solid #22C55E30;border-radius:10px;padding:8px 12px;font-size:11px;color:var(--green);margin-bottom:12px;">📊 Bank balance auto-updated: ${fmtFull(p.bankBal)}</div>`:''}
    <div style="display:flex;align-items:center;gap:13px;margin-bottom:16px;padding:14px;background:var(--card2);border-radius:14px;">
      <div style="width:48px;height:48px;border-radius:13px;background:${p.isCredit?'#22C55E20':'#EF444420'};display:flex;align-items:center;justify-content:center;font-size:22px;">${p.isCredit?'💰':'💸'}</div>
      <div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;">${p.isCredit?'CREDITED':'DEBITED'}</div><div style="font-size:26px;font-weight:900;letter-spacing:-1px;">${fmtFull(p.amount)}</div><div style="font-size:12px;color:var(--muted);">${p.merchant}</div></div>
    </div>
    <div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;">Category · Tap to change</div>
    <div class="cat-grid" id="sms-cats">${CATS.map(c=>`<button class="cat-btn${c.id===guessed?' sel':''}" id="sc-${c.id}" style="${c.id===guessed?`border-color:${c.color};color:${c.color};background:${c.color}18;`:''}" onclick="pickSMSCat('${c.id}','${c.color}')">${c.icon} ${c.label}</button>`).join('')}</div>
    ${!p.isCredit?`<div class="form-group"><label class="form-label">Linked Loan (if EMI)</label><select class="form-input" id="sms-loan"><option value="">None</option>${S.loans.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select></div>`:''}
    <div class="form-group"><label class="form-label">Note / Description</label><input class="form-input" id="sms-note" placeholder="Add description..."></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;padding:11px 14px;background:var(--card2);border-radius:12px;">
      <div><div style="font-size:13px;font-weight:600;">Mark as Wasteful 🗑️</div></div>
      <div class="toggle" id="sms-waste" onclick="this.classList.toggle('on')"></div>
    </div>
    <div style="display:flex;gap:9px;">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;padding:13px;">Skip</button>
      <button onclick="saveSMSTx('${guessed}')" class="btn btn-primary" style="flex:2;padding:13px;">Save ✓</button>
    </div>`);
  _smsData._cat=guessed;
}
function pickSMSCat(id,color){if(_smsData)_smsData._cat=id;document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('sel');b.style.borderColor='transparent';b.style.color='var(--muted)';b.style.background='var(--card2)';});const btn=document.getElementById('sc-'+id);if(btn){btn.classList.add('sel');btn.style.borderColor=color;btn.style.color=color;btn.style.background=color+'18';}}
function saveSMSTx(){
  if(!_smsData)return;
  const catId=_smsData._cat||(_smsData.isCredit?'income':'other');
  const isWaste=document.getElementById('sms-waste').classList.contains('on');
  const note=(document.getElementById('sms-note').value||'').trim();
  const loanEl=document.getElementById('sms-loan');const loanId=loanEl?parseInt(loanEl.value)||null:null;
  // Pending only if category is still unclassified
  const isPending=catId==='other';

  // Update bank balance; skip if onIncomingSMS already updated (real-time SMS path)
  if(!_smsData._balUpdated){
    if(_smsData.bankBal){
      S.bankBalance={amount:_smsData.bankBal,lastUpdated:today()};
    } else if(_smsData.amount>0){
      const cur=S.bankBalance.amount||0;
      const delta=_smsData.isCredit?_smsData.amount:-_smsData.amount;
      if(cur>0||_smsData.isCredit)S.bankBalance={amount:Math.max(0,cur+delta),lastUpdated:today()};
    }
  }

  // Salary history update for credited income
  if(_smsData.isCredit&&catId==='income'){
    S.salary.history.push({amount:_smsData.amount,date:today(),note});
    if(!S.salary.amount)S.salary.amount=_smsData.amount;
  }

  if(_smsData._pendingId){
    // Update the pre-saved pending tx (from onIncomingSMS)
    const tx=S.transactions.find(t=>t.id===_smsData._pendingId);
    if(tx){tx.category=catId;tx.note=note;tx.isWaste=isWaste;tx.isPending=isPending;tx.loanId=loanId;tx.merchant=_smsData.merchant;}
  } else {
    // pickAndroidSMS / openSMSSim path — add fresh tx
    S.transactions.push({id:Date.now(),amount:_smsData.amount,merchant:_smsData.merchant,category:catId,date:today(),note,isWaste,isPending,loanId,creditCardId:null,contactName:'',isCredit:_smsData.isCredit});
  }
  _smsData=null;
  save();closeModal();toast('✅ Transaction saved!');renderPage(currentPage);
}

function openSalarySettings(){
  openModal(`<div class="modal-title">⚙️ Salary Settings</div>
    <div class="form-group"><label class="form-label">Monthly Salary (${CUR_SYM})</label><input class="form-input" id="sal-amt" type="number" value="${S.salary.amount||''}" placeholder="e.g. 85000" inputmode="numeric"></div>
    <div class="form-group"><label class="form-label">Expected Salary Day</label><input class="form-input" id="sal-day" type="number" min="1" max="31" value="${S.salary.expectedDay||1}"></div>
    <div style="display:flex;gap:9px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;padding:13px;">Cancel</button><button onclick="saveSalarySettings()" class="btn btn-primary" style="flex:2;padding:13px;">Save</button></div>`);
}
function saveSalarySettings(){S.salary.amount=parseFloat(document.getElementById('sal-amt').value)||0;S.salary.expectedDay=parseInt(document.getElementById('sal-day').value)||1;save();closeModal();toast('✅ Salary saved!');renderPage(currentPage);}

function openMarkSalary(){
  openModal(`<div class="modal-title">✅ Salary Received</div>
    <div class="form-group"><label class="form-label">Amount (${CUR_SYM})</label><input class="form-input" id="rv-amt" type="number" value="${S.salary.amount||''}" inputmode="numeric"></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="rv-dt" type="date" value="${today()}"></div>
    <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="rv-nt" placeholder="e.g. May 2026 salary"></div>
    <div style="display:flex;gap:9px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;padding:13px;">Cancel</button><button onclick="saveMarkSalary()" class="btn btn-green" style="flex:2;padding:13px;">✓ Confirm</button></div>`);
}
function saveMarkSalary(){
  const amt=parseFloat(document.getElementById('rv-amt').value)||S.salary.amount;
  const dt=document.getElementById('rv-dt').value;
  const nt=document.getElementById('rv-nt').value;
  S.salary.history.push({amount:amt,date:dt,note:nt});
  S.salary.amount=amt;
  S.transactions.push({id:Date.now(),amount:amt,merchant:'Salary',category:'income',date:dt,note:nt,isWaste:false,isPending:false,loanId:null,creditCardId:null,contactName:''});
  // Add salary to bank balance on receipt
  S.bankBalance={amount:(S.bankBalance.amount||0)+amt,lastUpdated:dt};
  save();closeModal();toast('✅ Salary marked! Bank balance updated.');renderPage(currentPage);
}

function openAddIncome(){
  openModal(`<div class="modal-title">+ Add Income</div>
    <div class="form-group"><label class="form-label">Amount (${CUR_SYM})</label><input class="form-input" id="inc-amt" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label class="form-label">Source</label><input class="form-input" id="inc-src" placeholder="e.g. Freelance, Bonus, Interest..."></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="inc-dt" type="date" value="${today()}"></div>
    <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="inc-nt" placeholder="Optional"></div>
    <div style="display:flex;gap:9px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;padding:13px;">Cancel</button><button onclick="saveIncome()" class="btn btn-green" style="flex:2;padding:13px;">+ Add</button></div>`);
}
function saveIncome(){const amt=parseFloat(document.getElementById('inc-amt').value);const src=document.getElementById('inc-src').value.trim();if(!amt||!src){toast('Fill all fields');return;}S.transactions.push({id:Date.now(),amount:amt,merchant:src,category:'income',date:document.getElementById('inc-dt').value,note:document.getElementById('inc-nt').value,isWaste:false,isPending:false,loanId:null,creditCardId:null,contactName:''});save();closeModal();toast('✅ Income added!');renderPage(currentPage);}

function openAddLoan(editId){
  const loan=editId?S.loans.find(l=>l.id===editId):null;
  openModal(`<div class="modal-title">${loan?'✏️ Edit Loan':'+ Add Loan'}</div>
    <div class="form-group"><label class="form-label">Lender Name</label><input class="form-input" id="ln-name" value="${loan?loan.name:''}" placeholder="e.g. HDFC Bank"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">EMI (${CUR_SYM}/mo)</label><input class="form-input" id="ln-emi" type="number" value="${loan?loan.emi:''}" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">Rate (%)</label><input class="form-input" id="ln-rate" type="number" step="0.1" value="${loan?loan.rate:''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Outstanding (${CUR_SYM})</label><input class="form-input" id="ln-out" type="number" value="${loan?loan.outstanding:''}" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">Months Left</label><input class="form-input" id="ln-rem" type="number" value="${loan?loan.remaining:''}"></div>
    </div>
    <div style="display:flex;gap:9px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;padding:13px;">Cancel</button><button onclick="saveLoan(${editId||'null'})" class="btn btn-primary" style="flex:2;padding:13px;">${loan?'Update':'Add Loan'}</button></div>`);
}
function openEditLoan(id){openAddLoan(id);}
function saveLoan(editId){
  const name=document.getElementById('ln-name').value.trim();if(!name){toast('Enter lender name');return;}
  const emi=parseFloat(document.getElementById('ln-emi').value)||0;const rate=parseFloat(document.getElementById('ln-rate').value)||0;
  const outstanding=parseFloat(document.getElementById('ln-out').value)||0;const remaining=parseInt(document.getElementById('ln-rem').value)||0;
  if(editId){const idx=S.loans.findIndex(l=>l.id===editId);if(idx>=0)S.loans[idx]={...S.loans[idx],name,emi,rate,outstanding,remaining};}
  else{S.loans.push({id:Date.now(),name,emi,rate,outstanding,remaining,color:LOAN_COLORS[S.loans.length%LOAN_COLORS.length]});}
  save();closeModal();toast(editId?'✅ Loan updated!':'✅ Loan added!');renderLoans();
}

// ── TOAST & CLOCK ─────────────────────────────────────────────
function toast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.style.background=isError?'var(--red)':'var(--green)';t.style.display='block';clearTimeout(t._tmr);t._tmr=setTimeout(()=>t.style.display='none',2600);}
function updateClock(){const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── INIT ──────────────────────────────────────────────────────
// Set auth logo to detected currency symbol
(function(){const el=document.getElementById('auth-logo');if(el)el.textContent=CUR_SYM;})();
load();
updateClock();
setInterval(updateClock,30000);
renderPage('home');

// Poll for pending SMS every 5 s — drains the full queue to handle simultaneous bank SMS
if(IS_ANDROID){
  setInterval(()=>{
    if(!_fbUser)return;
    try{
      let d,count=0;
      while(count<10){
        d=AndroidBridge.getPendingSMS();
        if(!d||d==='null')break;
        const sms=JSON.parse(d);
        if(sms&&sms.body)onIncomingSMS(sms);
        count++;
      }
    }catch(e){}
  },5000);
}
// Check for existing session → skip login screen if token can be refreshed
(async()=>{
  const user=getStoredUser();
  if(user&&user.refreshToken){
    _fbUser=user;
    if(await ensureFreshToken()){
      await afterAuth();
      return;
    }
  }
  showAuthScreen();
})();
</script>
